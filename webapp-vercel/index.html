<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#141210">
<title>Ассистент дня</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#141210;
    --card:#1d1a17;
    --card2:#282420;
    --line:#2e2a25;
    --text:#f0eade;
    --dim:#9d9284;
    --accent:#cdf05a;
    --accent-ink:#1c2205;
    --accent-soft:rgba(205,240,90,.12);
    --good:#63c88b;
    --good-soft:rgba(99,200,139,.13);
    --warn:#e9a23b;
    --warn-soft:rgba(233,162,59,.13);
    --bad:#e2604f;
    --bad-soft:rgba(226,96,79,.13);
    --r:18px;
    --font-display:'Unbounded',sans-serif;
    --font-body:'Golos Text',-apple-system,system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg)}
  body{
    font-family:var(--font-body);
    color:var(--text);font-size:15px;line-height:1.5;
    padding:16px 14px calc(80px + env(safe-area-inset-bottom));
    max-width:560px;margin:0 auto;
    background:
      radial-gradient(120% 55% at 50% -8%, rgba(205,240,90,.06), transparent 60%),
      var(--bg);
    min-height:100vh;
  }
  button{font:inherit;border:none;cursor:pointer;background:none;color:inherit}
  svg{display:block;flex-shrink:0}

  /* ---------- шапка ---------- */
  .top{margin:4px 2px 16px}
  .top .over{
    font-size:11px;font-weight:600;color:var(--dim);
    text-transform:uppercase;letter-spacing:.14em;margin-bottom:7px;
    display:flex;align-items:center;gap:8px;
  }
  .top .over::before{content:'';width:16px;height:2px;background:var(--accent);border-radius:2px;flex-shrink:0}
  .top h1{
    font-family:var(--font-display);font-size:23px;font-weight:600;
    letter-spacing:-.01em;line-height:1.25;text-wrap:balance;
  }
  .demo-badge{
    display:inline-block;margin-left:8px;font-family:var(--font-body);
    font-size:10px;font-weight:700;letter-spacing:.08em;vertical-align:middle;
    color:var(--warn);background:var(--warn-soft);
    padding:3px 8px;border-radius:99px;text-transform:uppercase;
  }

  /* ---------- заголовки секций ---------- */
  h2{
    font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;
    letter-spacing:.13em;margin:22px 2px 9px;
    display:flex;align-items:center;gap:8px;
  }

  /* ---------- герой (сегодня) ---------- */
  .hero{display:grid;grid-template-columns:1.2fr 1fr;gap:10px}
  .hero .big{
    background:linear-gradient(150deg,#25211a,#1d1a17 65%);
    border:1px solid var(--line);border-radius:var(--r);
    padding:16px 15px;display:flex;align-items:center;gap:14px;
  }
  .ring{position:relative;width:64px;height:64px;flex-shrink:0}
  .ring svg{width:64px;height:64px;transform:rotate(-90deg)}
  .ring .track{stroke:var(--card2)}
  .ring .bar{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.22,1,.36,1)}
  .ring b{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:var(--font-display);font-size:13px;font-weight:600;letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;
  }
  .big .val{font-family:var(--font-display);font-size:14px;font-weight:600;line-height:1.3}
  .big .lbl{font-size:11px;color:var(--dim);font-weight:500;margin-top:3px}
  .hero .side{display:flex;flex-direction:column;gap:10px}
  .tile{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:12px 15px;flex:1;display:flex;flex-direction:column;justify-content:center;gap:1px;
  }
  .tile b{
    font-family:var(--font-display);font-size:19px;font-weight:600;letter-spacing:-.02em;
    font-variant-numeric:tabular-nums;
  }
  .tile span{font-size:11px;color:var(--dim);font-weight:500}
  .tile.accented b{color:var(--accent)}

  /* ---------- карточки и строки ---------- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .row{
    display:flex;align-items:center;gap:11px;padding:12px 14px;
    border-bottom:1px solid var(--line);
  }
  .row:last-child{border-bottom:none}
  .row .grow{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
  .row .sub{font-size:12px;color:var(--dim);font-weight:400}
  .chip{
    font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;flex-shrink:0;
    font-variant-numeric:tabular-nums;
  }
  .chip.warn{background:var(--warn-soft);color:var(--warn)}
  .chip.bad{background:var(--bad-soft);color:var(--bad)}
  .chip.good{background:var(--good-soft);color:var(--good)}
  .chip.dim{background:var(--card2);color:var(--dim)}

  /* круглые кнопки-действия */
  .act{
    width:34px;height:34px;border-radius:11px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
    color:var(--dim);background:var(--card2);
    transition:transform .12s ease,background .15s ease,color .15s ease,border-color .15s ease;
  }
  .act:active{transform:scale(.86)}
  .act.check{
    border-radius:99px;background:transparent;
    border:1.5px solid #3d3830;color:transparent;
  }
  .act.check:active{border-color:var(--accent)}
  .act.check.is-done{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
  .act.del:active{color:var(--bad);background:var(--bad-soft)}
  .streak{
    display:flex;align-items:center;gap:3px;flex-shrink:0;
    font-size:12px;font-weight:700;color:var(--warn);font-variant-numeric:tabular-nums;
  }
  .money{font-variant-numeric:tabular-nums;font-weight:600;flex-shrink:0;font-size:14px}

  /* пустые состояния */
  .empty{
    padding:26px 16px;text-align:center;color:var(--dim);font-size:13px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
  }
  .empty svg{opacity:.45}

  .clear{
    width:100%;padding:12px;color:var(--bad);font-size:13px;font-weight:600;
    border-top:1px solid var(--line);transition:background .15s;
  }
  .clear:active{background:var(--bad-soft)}

  /* ---------- строка добавления ---------- */
  .addbar{display:flex;gap:8px;margin-top:10px}
  .addbar input{
    flex:1;min-width:0;background:var(--card);border:1px solid var(--line);
    border-radius:99px;padding:11px 16px;color:var(--text);
    font:inherit;font-size:14px;outline:none;
    transition:border-color .15s;
  }
  .addbar input:focus{border-color:var(--accent)}
  .addbar input::placeholder{color:var(--dim)}
  .addbar input[type=date]{flex:0 0 118px;font-size:12px;padding:11px 12px;border-radius:16px;color-scheme:dark}
  .addbar input[type=number]{flex:0 0 90px;border-radius:16px}
  .addbar .go{
    width:44px;height:44px;border-radius:99px;flex-shrink:0;
    background:var(--accent);color:var(--accent-ink);
    display:flex;align-items:center;justify-content:center;
    transition:transform .12s ease;
  }
  .addbar .go:active{transform:scale(.9)}

  /* ---------- график ---------- */
  .chart{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:16px 14px 12px;margin-top:10px;
  }
  .chart .bars{display:flex;align-items:flex-end;gap:7px;height:72px}
  .chart .b{
    flex:1;display:flex;align-items:flex-end;justify-content:center;height:100%;
  }
  .chart .b i{
    display:block;width:100%;max-width:32px;border-radius:6px 6px 3px 3px;
    background:var(--card2);min-height:3px;
    transition:height .5s cubic-bezier(.22,1,.36,1);
  }
  .chart .b.hot i{background:var(--accent)}
  .chart .labels{display:flex;gap:7px;margin-top:8px}
  .chart .labels span{
    flex:1;text-align:center;font-size:10px;color:var(--dim);font-weight:500;
    font-variant-numeric:tabular-nums;
  }
  .chart .labels span.hot{color:var(--accent);font-weight:700}

  /* бюджет */
  .budget{
    background:var(--card);border:1px solid var(--line);border-radius:var(--r);
    padding:14px 15px;margin-top:10px;
  }
  .budget .bt{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:9px}
  .budget .bt span{font-size:12px;color:var(--dim);font-weight:500}
  .budget .bt b{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
  .budget .bt b.over{color:var(--bad)}
  .budget .track{height:8px;border-radius:99px;background:var(--card2);overflow:hidden}
  .budget .fill{
    height:100%;border-radius:99px;background:var(--accent);
    transition:width .6s cubic-bezier(.22,1,.36,1);
  }
  .budget .fill.warn{background:var(--warn)}
  .budget .fill.over{background:var(--bad)}

  /* плитки статистики (жизнь) */
  .strip{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
  .strip .tile{padding:13px 15px}

  /* ---------- навигация ---------- */
  nav{
    position:fixed;left:0;right:0;bottom:0;z-index:10;
    background:rgba(20,18,16,.88);
    backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
    border-top:1px solid var(--line);
    display:flex;justify-content:space-around;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
  }
  nav button{
    display:flex;flex-direction:column;align-items:center;gap:3px;
    color:var(--dim);font-size:10px;font-weight:600;
    padding:0;min-width:56px;transition:color .15s;
  }
  nav button .ic{
    width:38px;height:26px;border-radius:99px;
    display:flex;align-items:center;justify-content:center;
    transition:background .18s,color .18s;
  }
  nav button.on{color:var(--text)}
  nav button.on .ic{background:var(--accent);color:var(--accent-ink)}

  /* ---------- страницы ---------- */
  .page{display:none}
  .page.on{display:block;animation:pageIn .22s cubic-bezier(.22,1,.36,1)}
  @keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .phdr{display:flex;align-items:baseline;justify-content:space-between;margin:2px 2px 12px}
  .phdr h1{font-family:var(--font-display);font-size:20px;font-weight:600;letter-spacing:-.01em}
  .phdr .sub{font-size:12px;color:var(--dim);font-weight:500}

  /* загрузка */
  #load{display:flex;justify-content:center;gap:6px;padding:64px 0}
  #load i{width:8px;height:8px;border-radius:99px;background:var(--accent);animation:pulse 1s infinite ease-in-out}
  #load i:nth-child(2){animation-delay:.15s}
  #load i:nth-child(3){animation-delay:.3s}
  @keyframes pulse{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

  #err{display:none;padding:40px 20px;text-align:center;color:var(--dim);font-size:14px;line-height:1.6}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="err">Откройте мини-апп из Telegram — кнопка «Мини-апп» в меню бота.</div>
<div id="load"><i></i><i></i><i></i></div>

<div id="app" style="display:none">

  <!-- ======== СЕГОДНЯ ======== -->
  <div class="page on" id="p-home">
    <header class="top">
      <div class="over" id="date"></div>
      <h1 id="greet">Добрый день</h1>
    </header>
    <div class="hero">
      <div class="big">
        <div class="ring">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <circle class="track" cx="32" cy="32" r="27" fill="none" stroke-width="7"/>
            <circle class="bar" id="ring-bar" cx="32" cy="32" r="27" fill="none" stroke-width="7"
              stroke-dasharray="169.6" stroke-dashoffset="169.6"/>
          </svg>
          <b id="ring-txt">0/0</b>
        </div>
        <div>
          <div class="val" id="ring-word">Привычки</div>
          <div class="lbl">выполнено сегодня</div>
        </div>
      </div>
      <div class="side">
        <div class="tile"><b id="s-tasks">0</b><span>задач открыто</span></div>
        <div class="tile accented"><b id="s-spent">0 ₽</b><span>трат сегодня</span></div>
      </div>
    </div>
    <h2>Ближайшие задачи</h2>
    <div class="card" id="home-tasks"></div>
    <h2>Скоро испортится</h2>
    <div class="card" id="home-fridge"></div>
  </div>

  <!-- ======== ЗАДАЧИ ======== -->
  <div class="page" id="p-tasks">
    <div class="phdr"><h1>Задачи</h1><span class="sub" id="t-done"></span></div>
    <div class="card" id="tasks-list"></div>
    <form class="addbar" data-act="task_add">
      <input name="text" placeholder="Новая задача…" maxlength="200" required autocomplete="off">
      <button class="go" aria-label="Добавить задачу"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
    </form>
  </div>

  <!-- ======== ПОКУПКИ ======== -->
  <div class="page" id="p-shop">
    <div class="phdr"><h1>Покупки</h1><span class="sub" id="sh-count"></span></div>
    <div class="card" id="shop-list"></div>
    <form class="addbar" data-act="shop_add">
      <input name="text" placeholder="Молоко, хлеб…" maxlength="300" required autocomplete="off">
      <button class="go" aria-label="Добавить покупку"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
    </form>
  </div>

  <!-- ======== ХОЛОДИЛЬНИК ======== -->
  <div class="page" id="p-fridge">
    <div class="phdr"><h1>Холодильник</h1><span class="sub" id="fr-count"></span></div>
    <div class="card" id="fridge-list"></div>
    <form class="addbar" data-act="fridge_add">
      <input name="product" placeholder="Продукт…" maxlength="100" required autocomplete="off">
      <input name="expires" type="date" aria-label="Срок годности">
      <button class="go" aria-label="Добавить продукт"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
    </form>
  </div>

  <!-- ======== ЖИЗНЬ ======== -->
  <div class="page" id="p-life">
    <div class="phdr"><h1>Привычки</h1><span class="sub" id="hb-count"></span></div>
    <div class="card" id="habit-list"></div>
    <form class="addbar" data-act="habit_add">
      <input name="name" placeholder="Новая привычка…" maxlength="100" required autocomplete="off">
      <button class="go" aria-label="Добавить привычку"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
    </form>

    <h2>Расходы</h2>
    <div class="strip">
      <div class="tile"><b id="e-today">0 ₽</b><span>сегодня</span></div>
      <div class="tile"><b id="e-week">0 ₽</b><span>за 7 дней</span></div>
    </div>
    <div class="budget" id="budget" hidden>
      <div class="bt"><span>Бюджет месяца</span><b id="budget-txt"></b></div>
      <div class="track"><div class="fill" id="budget-fill"></div></div>
    </div>
    <div class="chart" id="chart" hidden>
      <div class="bars" id="chart-bars"></div>
      <div class="labels" id="chart-labels"></div>
    </div>
    <div class="card" id="exp-list" style="margin-top:10px"></div>
    <form class="addbar" data-act="expense_add">
      <input name="item" placeholder="Кофе…" maxlength="100" required autocomplete="off">
      <input name="amount" type="number" inputmode="decimal" min="1" step="any" placeholder="250" required aria-label="Сумма">
      <button class="go" aria-label="Добавить трату"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg></button>
    </form>
  </div>
</div>

<nav id="nav" style="display:none" aria-label="Разделы">
  <button data-p="home" class="on"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5V20a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg></span>Сегодня</button>
  <button data-p="tasks"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h11M4 12h7M4 18h5M14 16.5l2.5 2.5L21 14.5"/></svg></span>Задачи</button>
  <button data-p="shop"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h2.2l2.4 11.3A1.6 1.6 0 0 0 9.2 16.6h8.9a1.6 1.6 0 0 0 1.6-1.3L21.5 8H6.1"/><circle cx="10" cy="20" r="1.4"/><circle cx="17.5" cy="20" r="1.4"/></svg></span>Покупки</button>
  <button data-p="fridge"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M12 2.5v19M4 7l16 10M20 7 4 17M12 2.5 9.8 4.7M12 2.5l2.2 2.2M12 21.5l-2.2-2.2M12 21.5l2.2-2.2"/></svg></span>Холод</button>
  <button data-p="life"><span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12h4.2L10 5l4 14 2.8-7H21"/></svg></span>Жизнь</button>
</nav>

<script>
(function(){
  var tg = window.Telegram && Telegram.WebApp;
  var DEMO = !tg || !tg.initData;

  var appEl = document.getElementById('app');
  var loadEl = document.getElementById('load');

  if(tg){ try{ tg.ready(); tg.expand(); }catch(e){} }

  /* -------- дата и приветствие -------- */
  var now = new Date();
  document.getElementById('date').textContent =
    now.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  var h = now.getHours();
  var greet = h<5 ? 'Доброй ночи' : h<12 ? 'Доброе утро' : h<18 ? 'Добрый день' : 'Добрый вечер';
  document.getElementById('greet').innerHTML = greet +
    (DEMO ? ' <span class="demo-badge">демо</span>' : '');

  var D = null;

  /* -------- утилиты -------- */
  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  function fmt(n){return (Math.round(n*100)/100).toLocaleString('ru-RU');}
  function haptic(){ if(tg){ try{tg.HapticFeedback.impactOccurred('light');}catch(e){} } }

  var CHECK = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>';
  var CROSS = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg>';
  var FLAME = '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2s1 3.2-1.5 6C8.2 10.6 7 12.4 7 15a5 5 0 0 0 10 0c0-1.8-.7-3.1-1.5-4.2-.4 1-1 1.7-1.9 2.2.3-3.4-.6-8-1.6-11z"/></svg>';
  function ic(p){ return '<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+p+'</svg>'; }
  var IC_SUN = ic('<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>');
  var IC_LEAF = ic('<path d="M11 20A7 7 0 0 1 4 13c0-5 4-9 10-10 2 0 5 0 6 1-1 6-3 14-9 16z"/><path d="M4 21c3-4 7-7 12-9"/>');
  var IC_BOX  = ic('<path d="M21 8 12 3 3 8v8l9 5 9-5z"/><path d="M3 8l9 5 9-5M12 13v8"/>');

  /* -------- демо-данные (просмотр вне Telegram) -------- */
  function demoData(){
    var uid = 1000;
    function dd(offset){
      var d = new Date(now); d.setDate(d.getDate()-offset);
      return ('0'+d.getDate()).slice(-2)+'.'+('0'+(d.getMonth()+1)).slice(-2);
    }
    return {
      tasks:[
        {id:++uid, text:'Записаться к стоматологу', remind:'14:00'},
        {id:++uid, text:'Забрать посылку с почты', remind:''},
        {id:++uid, text:'Позвонить маме', remind:'19:30'}
      ],
      doneToday: 2,
      shopping:[
        {id:++uid, item:'Молоко'},{id:++uid, item:'Хлеб'},
        {id:++uid, item:'Яйца'},{id:++uid, item:'Кофе в зёрнах'}
      ],
      fridge:[
        {id:++uid, product:'Творог', expires:dd(-2), expiring:true, expired:false},
        {id:++uid, product:'Куриное филе', expires:dd(-1), expiring:true, expired:false},
        {id:++uid, product:'Сыр', expires:dd(-12), expiring:false, expired:false},
        {id:++uid, product:'Йогурт', expires:dd(2), expiring:true, expired:true}
      ],
      habits:[
        {id:++uid, name:'Зарядка', time:'08:00', done:true, streak:12},
        {id:++uid, name:'Читать 20 минут', time:'', done:true, streak:5},
        {id:++uid, name:'Пить воду', time:'', done:false, streak:0},
        {id:++uid, name:'Без сахара', time:'', done:false, streak:3}
      ],
      expenses:{
        today:640, week:5230, month:18400, budget:45000,
        daily:[
          {date:dd(6),total:820},{date:dd(5),total:430},{date:dd(4),total:1250},
          {date:dd(3),total:0},{date:dd(2),total:960},{date:dd(1),total:1130},
          {date:dd(0),total:640}
        ],
        recent:[
          {item:'Кофе', amount:250, date:dd(0)},
          {item:'Продукты', amount:390, date:dd(0)},
          {item:'Такси', amount:480, date:dd(1)},
          {item:'Аптека', amount:650, date:dd(1)},
          {item:'Обед', amount:520, date:dd(2)}
        ]
      }
    };
  }

  function demoApply(action, p){
    var uid = Date.now();
    function rm(arr,id){ var i=arr.findIndex(function(x){return x.id==id;}); if(i>-1)arr.splice(i,1); }
    if(action==='task_done'){ rm(D.tasks,p.id); D.doneToday++; }
    else if(action==='task_add' && p.text){ D.tasks.push({id:uid,text:p.text,remind:''}); }
    else if(action==='shop_add' && p.text){
      p.text.split(',').forEach(function(s){ s=s.trim(); if(s) D.shopping.push({id:++uid,item:s}); });
    }
    else if(action==='shop_del'){ rm(D.shopping,p.id); }
    else if(action==='shop_clear'){ D.shopping=[]; }
    else if(action==='fridge_add' && p.product){
      var d = p.expires ? p.expires.slice(8,10)+'.'+p.expires.slice(5,7) : '';
      D.fridge.push({id:uid,product:p.product,expires:d,expiring:false,expired:false});
    }
    else if(action==='fridge_del'){ rm(D.fridge,p.id); }
    else if(action==='habit_log'){
      var hb=D.habits.find(function(x){return x.id==p.id;});
      if(hb && !hb.done){ hb.done=true; hb.streak++; }
    }
    else if(action==='habit_add' && p.name){ D.habits.push({id:uid,name:p.name,time:'',done:false,streak:0}); }
    else if(action==='habit_del'){ rm(D.habits,p.id); }
    else if(action==='expense_add' && p.item){
      var a=parseFloat(p.amount)||0;
      D.expenses.today+=a; D.expenses.week+=a; D.expenses.month+=a;
      D.expenses.daily[D.expenses.daily.length-1].total+=a;
      D.expenses.recent.unshift({item:p.item,amount:a,date:D.expenses.daily[6].date});
    }
  }

  /* -------- API -------- */
  function api(action, payload){
    if(DEMO){
      if(action && action!=='overview') demoApply(action, payload||{});
      render();
      return Promise.resolve();
    }
    return fetch('/api',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({initData:tg.initData,action:action||'overview',payload:payload||{}})})
      .then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(function(d){ D=d; render(); });
  }

  /* -------- рендер -------- */
  function rows(el, items, fn, emptyText, icon){
    el.innerHTML = items.length
      ? items.map(fn).join('')
      : '<div class="empty">'+(icon||'')+'<span>'+emptyText+'</span></div>';
  }

  function taskRow(t){
    return '<div class="row">'+
      '<button class="act check" data-a="task_done" data-id="'+t.id+'" aria-label="Выполнить">'+CHECK+'</button>'+
      '<span class="grow">'+esc(t.text)+'</span>'+
      (t.remind?'<span class="chip dim">'+esc(t.remind)+'</span>':'')+
      '</div>';
  }

  function fridgeRow(f){
    var chip = f.expired ? '<span class="chip bad">'+esc(f.expires)+'</span>'
      : f.expiring ? '<span class="chip warn">'+esc(f.expires)+'</span>'
      : f.expires ? '<span class="chip dim">'+esc(f.expires)+'</span>' : '';
    return '<div class="row"><span class="grow">'+esc(f.product)+'</span>'+chip+
      '<button class="act del" data-a="fridge_del" data-id="'+f.id+'" aria-label="Удалить">'+CROSS+'</button></div>';
  }

  function render(){
    if(!D) return;
    var doneH = D.habits.filter(function(x){return x.done;}).length;
    var totH = D.habits.length;

    /* --- сегодня --- */
    document.getElementById('s-tasks').textContent = D.tasks.length;
    document.getElementById('s-spent').textContent = fmt(D.expenses.today)+' ₽';
    document.getElementById('ring-txt').textContent = doneH+'/'+totH;
    var circ = 169.6;
    var frac = totH ? doneH/totH : 0;
    document.getElementById('ring-bar').style.strokeDashoffset = String(circ*(1-frac));
    document.getElementById('ring-word').textContent =
      totH && doneH===totH ? 'Все привычки!' : 'Привычки';
    rows(document.getElementById('home-tasks'), D.tasks.slice(0,4), taskRow, 'Задач нет — отдыхайте', IC_SUN);
    var expiring = D.fridge.filter(function(f){return f.expiring;});
    rows(document.getElementById('home-fridge'), expiring.slice(0,4), fridgeRow, 'Всё свежее', IC_LEAF);

    /* --- задачи --- */
    document.getElementById('t-done').textContent = D.doneToday ? D.doneToday+' сделано сегодня' : '';
    rows(document.getElementById('tasks-list'), D.tasks, taskRow, 'Список пуст', IC_SUN);

    /* --- покупки --- */
    document.getElementById('sh-count').textContent = D.shopping.length ? D.shopping.length+' поз.' : '';
    rows(document.getElementById('shop-list'), D.shopping, function(s){
      return '<div class="row">'+
        '<button class="act check" data-a="shop_del" data-id="'+s.id+'" aria-label="Куплено">'+CHECK+'</button>'+
        '<span class="grow">'+esc(s.item)+'</span></div>';
    }, 'Список пуст', IC_BOX);
    if(D.shopping.length>1){
      document.getElementById('shop-list').insertAdjacentHTML('beforeend',
        '<button class="clear" data-a="shop_clear">Очистить всё</button>');
    }

    /* --- холодильник --- */
    document.getElementById('fr-count').textContent = D.fridge.length ? D.fridge.length+' прод.' : '';
    rows(document.getElementById('fridge-list'), D.fridge, fridgeRow, 'Холодильник пуст', IC_BOX);

    /* --- привычки --- */
    document.getElementById('hb-count').textContent = totH ? doneH+' из '+totH : '';
    rows(document.getElementById('habit-list'), D.habits, function(hb){
      return '<div class="row">'+
        '<button class="act check'+(hb.done?' is-done':'')+'" data-a="habit_log" data-id="'+hb.id+'" aria-label="Отметить">'+CHECK+'</button>'+
        '<span class="grow">'+esc(hb.name)+(hb.time?' <span class="sub">'+esc(hb.time)+'</span>':'')+'</span>'+
        (hb.streak?'<span class="streak">'+FLAME+hb.streak+'</span>':'')+
        '<button class="act del" data-a="habit_del" data-id="'+hb.id+'" data-confirm="Удалить привычку?" aria-label="Удалить">'+CROSS+'</button></div>';
    }, 'Привычек пока нет', IC_LEAF);

    /* --- расходы --- */
    document.getElementById('e-today').textContent = fmt(D.expenses.today)+' ₽';
    document.getElementById('e-week').textContent = fmt(D.expenses.week)+' ₽';

    var budgetEl = document.getElementById('budget');
    if(D.expenses.budget > 0){
      budgetEl.hidden = false;
      var pct = Math.min(100, Math.round(D.expenses.month / D.expenses.budget * 100));
      var left = D.expenses.budget - D.expenses.month;
      var txt = document.getElementById('budget-txt');
      txt.textContent = left >= 0
        ? 'осталось '+fmt(left)+' ₽'
        : 'превышен на '+fmt(-left)+' ₽';
      txt.classList.toggle('over', left < 0);
      var fill = document.getElementById('budget-fill');
      fill.style.width = pct+'%';
      fill.className = 'fill'+(pct>=100?' over':pct>=80?' warn':'');
    } else budgetEl.hidden = true;

    var daily = D.expenses.daily || [];
    var chartEl = document.getElementById('chart');
    if(daily.length){
      chartEl.hidden = false;
      var max = Math.max.apply(null, daily.map(function(x){return x.total;}).concat([1]));
      document.getElementById('chart-bars').innerHTML = daily.map(function(x,i){
        var hgt = x.total > 0 ? Math.max(8, Math.round(x.total/max*100)) : 4;
        return '<div class="b'+(i===daily.length-1?' hot':'')+'"><i style="height:'+hgt+'%"></i></div>';
      }).join('');
      document.getElementById('chart-labels').innerHTML = daily.map(function(x,i){
        return '<span'+(i===daily.length-1?' class="hot"':'')+'>'+esc(String(x.date).slice(0,2))+'</span>';
      }).join('');
    } else chartEl.hidden = true;

    rows(document.getElementById('exp-list'), D.expenses.recent, function(e){
      return '<div class="row"><span class="grow">'+esc(e.item)+' <span class="sub">'+esc(e.date)+'</span></span>'+
        '<span class="money">'+fmt(e.amount)+' ₽</span></div>';
    }, 'Трат пока нет', IC_BOX);
  }

  /* -------- навигация -------- */
  document.getElementById('nav').addEventListener('click', function(ev){
    var b = ev.target.closest('button[data-p]'); if(!b) return;
    haptic();
    document.querySelectorAll('nav button').forEach(function(x){x.classList.toggle('on', x===b);});
    document.querySelectorAll('.page').forEach(function(p){p.classList.toggle('on', p.id==='p-'+b.dataset.p);});
    window.scrollTo(0,0);
  });

  /* -------- действия -------- */
  appEl.addEventListener('click', function(ev){
    var b = ev.target.closest('[data-a]'); if(!b) return;
    var run = function(){ haptic(); api(b.dataset.a, {id: b.dataset.id}); };
    if(b.dataset.confirm){
      if(tg && tg.showConfirm){ tg.showConfirm(b.dataset.confirm, function(ok){ if(ok) run(); }); }
      else if(confirm(b.dataset.confirm)){ run(); }
    } else run();
  });

  /* -------- формы -------- */
  document.querySelectorAll('form[data-act]').forEach(function(f){
    f.addEventListener('submit', function(ev){
      ev.preventDefault();
      var payload = {};
      new FormData(f).forEach(function(v,k){ payload[k]=v; });
      haptic();
      api(f.dataset.act, payload).then(function(){ f.reset(); });
    });
  });

  /* -------- старт -------- */
  function show(){
    loadEl.style.display='none';
    appEl.style.display='block';
    document.getElementById('nav').style.display='flex';
  }

  if(DEMO){
    D = demoData();
    render(); show();
  } else {
    api().then(show).catch(function(){
      loadEl.style.display='none';
      var e=document.getElementById('err');
      e.textContent='Не удалось загрузить данные. Закройте и откройте мини-апп ещё раз.';
      e.style.display='block';
    });
  }
})();
</script>
</body>
</html>
